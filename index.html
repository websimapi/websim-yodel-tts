<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yodel-TTS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div id="app-container">
        <h1>Yodel-TTS</h1>
        <p>Turn any text into a yodel-tastic masterpiece!</p>
        <textarea id="text-input" placeholder="Enter your text here... e.g., 'Hello from the mountains'" rows="4"></textarea>
        <button id="yodel-button">Yodel It!</button>
        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Warming up the vocal cords...</p>
        </div>
        <p id="error-message" class="hidden"></p>
    </div>
    <script src="script.js"></script>
